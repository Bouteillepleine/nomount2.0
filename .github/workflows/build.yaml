name: Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r27c
  NDK_HOME: /opt/ndk

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [debug, release]
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
          - i686-linux-android
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NDK
        run: |
          curl -sSfL "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" -o ndk.zip
          unzip -q ndk.zip -d /opt
          mv /opt/android-ndk-${NDK_VERSION} ${NDK_HOME}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-${{ matrix.profile }}-

      - name: Build
        run: |
          export PATH="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          FLAGS=""
          if [ "$PROFILE" = "release" ]; then
            FLAGS="--release"
          fi
          cargo build $FLAGS --target "$TARGET"
        env:
          PROFILE: ${{ matrix.profile }}
          TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi26-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android26-clang

      - name: Assert debug info preserved
        if: matrix.profile == 'debug'
        run: |
          bin="target/${TARGET}/debug/nomount"
          file "$bin"
          if ! readelf -S "$bin" | grep -q debug_info; then
            echo "::error::debug binary missing debug_info section"
            exit 1
          fi
        env:
          TARGET: ${{ matrix.target }}

      - name: Assert stripped
        if: matrix.profile == 'release'
        run: |
          bin="target/${TARGET}/release/nomount"
          file "$bin"
          if readelf -S "$bin" | grep -q debug_info; then
            echo "::error::release binary still contains debug_info"
            exit 1
          fi
        env:
          TARGET: ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.abi }}-${{ matrix.profile }}
          path: target/${{ matrix.target }}/${{ matrix.profile }}/nomount
          retention-days: 7

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries into target tree
        run: |
          declare -A ABI_TARGET=(
            [arm64-v8a]=aarch64-linux-android
            [armeabi-v7a]=armv7-linux-androideabi
            [x86_64]=x86_64-linux-android
            [x86]=i686-linux-android
          )
          for profile in debug release; do
            for abi in arm64-v8a armeabi-v7a x86_64 x86; do
              target="${ABI_TARGET[$abi]}"
              src="artifacts/bin-${abi}-${profile}/nomount"
              dst="target/${target}/${profile}/nomount"
              mkdir -p "$(dirname "$dst")"
              cp "$src" "$dst"
              chmod +x "$dst"
            done
          done

      - name: Read version
        id: ver
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${ver}" >> "$GITHUB_OUTPUT"

      - name: Package ZIPs
        run: scripts/package.sh --version "$VER"
        env:
          VER: ${{ steps.ver.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: nomount-release-zip
          path: release/release/nomount-*.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: nomount-debug-zip
          path: release/debug/nomount-*.zip
          retention-days: 30

  release:
    needs: [build, package]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${ver}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: nomount-release-zip
          path: zips/release

      - uses: actions/download-artifact@v4
        with:
          name: nomount-debug-zip
          path: zips/debug

      - name: Extract changelog
        id: notes
        run: |
          ver="${VER#v}"
          awk "/^## v${ver}/{flag=1; next} /^## v/{if(flag) exit} flag" CHANGELOG.md > /tmp/notes.md
          cat /tmp/notes.md
        env:
          VER: ${{ steps.ver.outputs.version }}

      - name: Create release
        run: |
          gh release delete "$VER" --yes 2>/dev/null || true
          gh release create "$VER" \
            --title "$VER" \
            --latest \
            --notes-file /tmp/notes.md \
            zips/release/*.zip \
            zips/debug/*.zip
        env:
          VER: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
